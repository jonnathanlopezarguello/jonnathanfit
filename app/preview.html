<title>Jonnathan Fit - Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#121211;--surface:#121211;--surface2:#1C1C1A;--line:#2A2A28;--line2:#3D3D3A;--text:#F2F2EE;--text2:#B9B9B2;--text3:#8A8A82;--accent:#F2F2EE;--accentSoft:rgba(242,242,238,.08);--good:#7FB07A;--over:#D26A45}
html,body{background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);height:100%;overflow:hidden}
#phone{width:390px;max-width:100vw;height:100dvh;max-height:844px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
@media(min-width:420px){#phone{border:1px solid var(--line2);border-radius:20px;margin-top:max(0px,calc(50vh - 422px))}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:14px}
.bdot{width:7px;height:7px;border-radius:50%;background:var(--text);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.3}}
.logo{font-size:15px;font-weight:300}.logo b{font-weight:700}
.clock{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.pbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;cursor:pointer;background:none}
.pbtn svg{width:18px;height:18px}
.hl{height:1px;background:var(--line);flex-shrink:0}
.tbar{height:50px;display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tbar::-webkit-scrollbar{display:none}
.tb{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 12px;cursor:pointer;flex-shrink:0}
.tb svg{width:20px;height:20px;margin-top:6px}
.tb .tl{font-size:9px;font-weight:500;letter-spacing:.5px;margin-top:2px;color:var(--text3);white-space:nowrap}
.tb.a .tl{color:var(--text)}
.tb.a svg *[stroke]{stroke:var(--text)!important}
.tul{width:14px;height:1.5px;margin-top:3px;background:var(--accent);display:none}
.tb.a .tul{display:block}
.ca{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr{display:none;padding:24px;padding-bottom:60px}
.scr.a{display:block}
.card{border:1px solid var(--line);padding:20px;margin-bottom:24px}
.card-ac{border-color:var(--accent)}
.dv{display:flex;align-items:center;margin-bottom:20px;margin-top:8px}
.dvl{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;color:var(--text3);margin-right:12px;white-space:nowrap}
.dvln{flex:1;height:1px;background:var(--line)}
.sup{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;color:var(--text3);margin-bottom:4px}
.ttl{font-size:30px;font-weight:300;margin-bottom:24px}
.sl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:8px;margin-bottom:8px;font-weight:500}
.btn1{min-height:42px;display:flex;align-items:center;justify-content:center;background:var(--accent);cursor:pointer}
.btn1 span{font-size:12px;font-weight:600;letter-spacing:2.5px;color:var(--bg)}
.btn1:active{opacity:.85}
input[type=text],input[type=number]{background:transparent;color:var(--text);border:1px solid var(--line);outline:none;font-family:inherit}
input:focus{border-color:var(--text3)!important}
.sinp{width:100%;border:1px solid var(--line);padding:10px 12px;font-size:14px;background:transparent;color:var(--text);outline:none;margin-bottom:12px}
.moverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.mdlg{background:var(--surface2);border:1px solid var(--line);padding:24px;max-width:340px;width:100%}
.mdlg h3{font-size:15px;font-weight:500;margin-bottom:8px}
.mdlg p{font-size:13px;color:var(--text2);line-height:18px;margin-bottom:20px;white-space:pre-line}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:10px 20px;cursor:pointer;font-size:11px;letter-spacing:1px;font-weight:500;border:1px solid var(--line);background:transparent;color:var(--text3);font-family:inherit}
.mbtn.p{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.mbtn.d{background:var(--over);border-color:var(--over);color:#fff}
.hidden{display:none!important}
/* Exercise and set styles */
.excard{border:1px solid var(--line);padding:16px;margin-bottom:8px}
.srow{display:flex;align-items:center;padding:6px 0;gap:6px}
.srow.dn{background:var(--accentSoft)}
.si{flex:1;border:1px solid var(--line);padding:8px;font-size:14px;text-align:center;background:transparent;color:var(--text);outline:none;font-variant-numeric:tabular-nums}
.srow.dn .si{border-color:var(--accent)}
.dbtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--text3);font-size:14px}
.dbtn.ck{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.xbtn{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:4px}
.dashed{border:1px dashed var(--line);padding:12px;text-align:center;cursor:pointer;color:var(--text3);font-size:11px;letter-spacing:1px;background:transparent}
.dashed:hover{border-color:var(--text3)}
.exr{border:1px solid var(--line);padding:14px;margin-bottom:8px;display:flex;align-items:center;cursor:pointer}
.exr:hover,.exr.a{border-color:var(--accent)}
.chip{border:1px solid var(--line);padding:6px 10px;cursor:pointer;font-size:10px;color:var(--text3);white-space:nowrap;display:inline-block}
.chip.a{border-color:var(--accent);background:var(--accentSoft);color:var(--text)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
.trow+.trow{border-top:1px solid var(--line)}
</style>
</head>
